name: Build to Work Directory

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - 'package.json'
      - '.github/workflows/deploy.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Copy files to work directory
        run: |
          mkdir -p work
          cp -r src work/
          cp wrangler.toml work/
          cp package.json work/
          cp package-lock.json work/ 2>/dev/null || true

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add work/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Build: Copy files to work directory" && git push)

name: Build work folder (no deploy)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Prepare deployment files (work folder)
        run: |
          rm -rf work
          mkdir -p work/src
          cp -r src work/
          cp package.json wrangler.toml work/
          # 如果你有 schema.sql 或其他文件，可在此添加
          # cp schema.sql work/

      - name: Upload artifact (the work folder)
        uses: actions/upload-artifact@v4
        with:
          name: work-folder
          path: work/

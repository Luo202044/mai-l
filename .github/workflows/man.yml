name: Build and commit work folder

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 需要完整历史以便提交

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Prepare deployment files (work folder)
        run: |
          rm -rf work
          mkdir -p work/src
          cp -r src work/
          cp package.json wrangler.toml work/
          # 如果有其他文件，可在此添加

      - name: Commit and push work folder
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add work
          git commit -m "Update work folder [skip ci]" || echo "No changes to commit"
          git push origin main
